<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Panaji WebGIS with Sidebar Filter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Roboto", sans-serif;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    #sidebar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 14px;
    }
    #sidebar h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    select {
      width: 180px;
      padding: 5px;
      border-radius: 4px;
      border: 1px solid #aaa;
    }
    .legend {
      background: white;
      padding: 10px;
      line-height: 18px;
      color: #333;
      font-size: 13px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
    }
    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 6px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Filter by Area</h3>
    <select id="areaFilter">
      <option value="all">All Areas</option>
    </select>
  </div>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Initialize map
    var map = L.map('map').setView([15.5, 73.8], 11);

    // Base map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Colors for admin
    function getAdminColor(name) {
      const colors = {
        "Panjim": "#1f77b4",
        "Tiswadi": "#2ca02c",
        "Ilhas": "#d62728"
      };
      return colors[name] || "#9467bd";
    }

    // Style admin
    function adminStyle(feature) {
      return {
        fillColor: getAdminColor(feature.properties.NAME_2),
        weight: 1,
        opacity: 1,
        color: "#333",
        dashArray: "3",
        fillOpacity: 0.6
      };
    }

    // Admin layer
    var adminLayer = L.geoJSON(null, {
      style: adminStyle,
      onEachFeature: function(feature, layer) {
        layer.on("click", function() {
          layer.bindPopup("<b>Area:</b> " + feature.properties.NAME_2).openPopup();
        });
      }
    }).addTo(map);

    // Store admin data
    var adminData = null;

    // Load Admin GeoJSON
    fetch("https://raw.githubusercontent.com/coss53/panjab_upwork/main/panjab_admin.geojson")
      .then(res => res.json())
      .then(data => {
        adminData = data;
        adminLayer.addData(data);
        map.fitBounds(adminLayer.getBounds());
        populateAreaDropdown(data);
      });

    // Colors for road types
    function getRoadColor(med) {
      const colors = {
        "National Highway": "#e41a1c",
        "State Highway": "#377eb8",
        "Major District Road": "#4daf4a",
        "Other District Road": "#984ea3",
        "Village Road": "#ff7f00"
      };
      return colors[med] || "#999";
    }

    function roadStyle(feature) {
      return {
        color: getRoadColor(feature.properties.MED_DESCRI),
        weight: 2,
        opacity: 0.9
      };
    }

    function onRoadEachFeature(feature, layer) {
      const props = feature.properties;
      const popupContent =
        "<b>Road Type:</b> " + (props.MED_DESCRI || "N/A") + "<br>" +
        "<b>Surface:</b> " + (props.RTT_DESCRI || "N/A");
      layer.bindPopup(popupContent);
    }

    var roadLayer = L.geoJSON(null, {
      style: roadStyle,
      onEachFeature: onRoadEachFeature
    });

    var roadData = null;
    fetch("https://raw.githubusercontent.com/coss53/panjab_upwork/main/panab_road.geojson")
      .then(res => res.json())
      .then(data => {
        roadData = data;
        roadLayer.addData(data);
      });

    // Legend for roads
    var roadLegend = L.control({position: "bottomright"});
    roadLegend.onAdd = function () {
      var div = L.DomUtil.create("div", "legend");
      var categories = ["National Highway","State Highway","Major District Road","Other District Road","Village Road"];
      categories.forEach(cat => {
        div.innerHTML += '<i style="background:' + getRoadColor(cat) + '"></i> ' + cat + '<br>';
      });
      return div;
    };

    // Layer control
    var overlays = {
      "Roads": roadLayer
    };
    var layerControl = L.control.layers(null, overlays, {collapsed:false}).addTo(map);

    // Legend toggle
    map.on("overlayadd", function(e) {
      if (e.name === "Roads") roadLegend.addTo(map);
    });
    map.on("overlayremove", function(e) {
      if (e.name === "Roads") map.removeControl(roadLegend);
    });

    // Populate dropdown with admin NAME_2
    function populateAreaDropdown(data) {
      const select = document.getElementById("areaFilter");
      const names = [...new Set(data.features.map(f => f.properties.NAME_2))];
      names.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    // Filter function
    document.getElementById("areaFilter").addEventListener("change", function() {
      const selected = this.value;

      // Filter admin
      adminLayer.clearLayers();
      if (selected === "all") {
        adminLayer.addData(adminData);
        map.fitBounds(adminLayer.getBounds());
      } else {
        const filtered = {
          type: "FeatureCollection",
          features: adminData.features.filter(f => f.properties.NAME_2 === selected)
        };
        adminLayer.addData(filtered);
        map.fitBounds(adminLayer.getBounds());
      }

      // Filter roads
      if (roadData) {
        roadLayer.clearLayers();
        if (selected === "all") {
          roadLayer.addData(roadData);
        } else {
          const filteredRoads = {
            type: "FeatureCollection",
            features: roadData.features.filter(f => f.properties.NAME_2 === selected)
          };
          roadLayer.addData(filteredRoads);
        }
      }
    });
  </script>
</body>
</html>
